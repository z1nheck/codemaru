<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<style>
  :root { color-scheme: light dark; }
  body {
    width: 290px; margin: 0; padding: 14px 14px 16px;
    font: 13px/1.5 -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
  }
  h1 { font-size: 14px; margin: 0 0 2px; }
  .sub { font-size: 11px; opacity: .65; margin: 0 0 12px; }
  .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
  select { flex: 1; padding: 4px; }
  button { width: 100%; padding: 9px; margin-top: 6px; border: 0; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; }
  #go { background: #6c8cff; color: #fff; }
  #undo { background: rgba(127,127,127,.18); }
  label.chk { display: flex; gap: 7px; align-items: flex-start; font-size: 12px; margin: 9px 0 2px; cursor: pointer; }
  label.chk span { opacity: .82; }
  #status { font-size: 11px; min-height: 15px; margin-top: 10px; white-space: pre-wrap; opacity: .85; }
  .pill { font-size: 10px; opacity: .6; margin-top: 4px; }
</style>
</head>
<body>
  <h1>Codemaru <span style="font-size:10px;opacity:.5">v0.2</span></h1>
  <p class="sub">内蔵Gemini Nanoでコード保持・語順重視の翻訳。</p>

  <div class="row">
    <select id="source">
      <option value="en" selected>English</option>
      <option value="zh">中文</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
    </select>
    <span style="opacity:.5">→</span>
    <select id="target">
      <option value="ja" selected>日本語</option>
      <option value="en">English</option>
    </select>
  </div>

  <label class="chk">
    <input type="checkbox" id="forceMT" />
    <span>高速モード(内蔵MT)で訳す ― Nano版と語順を比較する用</span>
  </label>
  <label class="chk">
    <input type="checkbox" id="includeCode" />
    <span>コードも訳す ― Google翻訳相当の壊れ方を再現</span>
  </label>

  <button id="go">このページを翻訳</button>
  <button id="undo">原文に戻す</button>

  <div id="status"></div>
  <div class="pill" id="engine"></div>

  <script src="popup.js"></script>
</body>
</html>
